name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    env:
      # Phase 0: no real services needed — dummy URLs satisfy Settings validation
      DATABASE_URL: postgresql+asyncpg://ci:ci@localhost:5432/ci
      DATABASE_URL_SYNC: postgresql+psycopg://ci:ci@localhost:5432/ci
      DB_SCHEMA: pii
      REDIS_URL: redis://localhost:6379/0
      CLAMAV_HOST: localhost
      CLAMAV_PORT: "3310"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Create venv + install deps
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy (strict)
        run: uv run mypy app/

      - name: Bandit
        run: uv run bandit -r app/ -c pyproject.toml

      - name: Pytest
        run: uv run pytest

  security-scan:
    # Phase 8 — T8.5: dependency vulnerability scan. Runs in parallel
    # with the main lint/test job. Failures here are advisory (the job
    # reports findings via `--strict false`); High/Critical CVEs in
    # production deps should still gate releases.
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Create venv + install runtime deps only
        run: |
          uv venv
          uv pip install -e .

      - name: pip-audit (dependency CVEs)
        run: |
          uv pip install pip-audit
          # ko_core_news_lg lives outside PyPI; skip-editable filters that out.
          uv run pip-audit --skip-editable || true
        continue-on-error: true

  container-build:
    # Phase 8 — T8.6: verify the multi-stage Dockerfile builds. We don't
    # push the image; we just want to catch breakages introduced by
    # dependency churn before they reach production.
    runs-on: ubuntu-latest
    needs: lint-type-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: false
          load: true
          tags: pii-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image size check (sanity)
        run: docker images pii-api:ci --format "{{.Size}}"

      - name: Smoke run (importable + health check)
        # The image's CMD launches uvicorn; we override to do a minimal
        # import to verify the build is functional. Full /readyz checks
        # need DB + Redis which aren't available in this job.
        run: |
          docker run --rm pii-api:ci \
            python -c "from app.main import app; print(f'routes={len(app.routes)}')"
