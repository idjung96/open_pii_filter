# Phase 8 — local stack for the PII Detection API (T8.6).
#
# Brings up the API, PostgreSQL 16, Redis 7, and ClamAV (optional). Use
# from the deploy/ directory:
#
#     cd deploy && docker compose up --build
#
# Production deployments should derive a Compose file (or k8s manifest)
# from this template — replace POSTGRES_PASSWORD, drop ClamAV if you
# integrate with an external malware-scan service, and front the API
# with the nginx config in deploy/nginx.conf.

services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: pii-api:phase-8
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://pii:change_me_in_prod@postgres:5432/pii
      DATABASE_URL_SYNC: postgresql+psycopg://pii:change_me_in_prod@postgres:5432/pii
      REDIS_URL: redis://redis:6379/0
      CLAMAV_HOST: clamav
      CLAMAV_PORT: 3310
      APP_ENV: production
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pii
      POSTGRES_USER: pii
      POSTGRES_PASSWORD: change_me_in_prod
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pii"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  clamav:
    image: clamav/clamav:1.3
    ports:
      - "3310:3310"
    healthcheck:
      test: ["CMD-SHELL", "clamdcheck.sh || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 120s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata: {}
