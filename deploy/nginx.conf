# nginx.conf — Phase 3 sample for the PII Detection API
#
# Front-of-house responsibilities:
#   - TLS termination
#   - Trusted IP allowlist (defence in depth alongside `api_keys.ip_allowlist`)
#   - Hard cap on request body (1 MB to match T3.9)
#   - Pass-through of X-API-Key / X-Timestamp / X-Nonce / X-Signature
#   - Pass the original client IP via X-Forwarded-For (the app reads
#     this when computing `AuthedCaller.client_ip`)
#
# Place this under /etc/nginx/conf.d/pii-api.conf (or include it from
# the main nginx.conf). Replace TLS paths and IP allowlist before use.

upstream pii_api_backend {
    # uvicorn worker(s); add more lines for horizontal scaling.
    server 127.0.0.1:8000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name pii.example.local;

    ssl_certificate     /etc/ssl/certs/pii-api.crt;
    ssl_certificate_key /etc/ssl/private/pii-api.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # T3.9 — body cap (defence in depth; app re-checks).
    client_max_body_size 1m;
    client_body_timeout  10s;
    client_header_timeout 5s;

    # T3.8 — IP allowlist (Nginx layer). The application also enforces
    # per-key IP allowlists; this layer is the cheaper outer fence.
    set $is_allowed 0;
    # Replace with your operator network ranges.
    if ($remote_addr ~ "^(10\.0\.0\.|192\.168\.1\.)") { set $is_allowed 1; }
    if ($remote_addr = "127.0.0.1")                    { set $is_allowed 1; }
    if ($is_allowed = 0) { return 403; }

    # Logs include the request_id header so app-side audits and Nginx
    # access logs can be correlated.
    log_format pii_audit '$remote_addr $msec $request '
                        'rid="$http_x_request_id" '
                        'apikey="$http_x_api_key" '
                        'status=$status bytes=$body_bytes_sent';
    access_log /var/log/nginx/pii-api.access.log pii_audit;
    error_log  /var/log/nginx/pii-api.error.log warn;

    # Reject path traversal attempts at the edge.
    location ~* \.(env|git|bak|swp)$ { return 404; }

    # ── Application routes ────────────────────────────────────────────────
    location / {
        proxy_pass         http://pii_api_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host                $host;
        proxy_set_header   X-Real-IP           $remote_addr;
        proxy_set_header   X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto   $scheme;
        proxy_set_header   Connection          "";
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }
}

# Optional plain-HTTP redirect to HTTPS for misconfigured clients.
server {
    listen 80;
    server_name pii.example.local;
    return 301 https://$host$request_uri;
}
