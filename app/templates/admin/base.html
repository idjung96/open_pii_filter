<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}PII Admin Dashboard{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body { padding-top: 5.5rem; }
    .table-responsive { max-height: 70vh; }
    pre { white-space: pre-wrap; word-break: break-all; }
    .nav-group-label {
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #adb5bd;
      margin-right: 0.5rem;
    }
    .nav-btn {
      --bs-btn-padding-y: 0.25rem;
      --bs-btn-padding-x: 0.65rem;
      --bs-btn-font-size: 0.875rem;
    }
    .nav-btn.active {
      background-color: #0d6efd;
      border-color: #0d6efd;
      color: #fff;
    }
    .nav-divider {
      width: 1px;
      height: 1.75rem;
      background-color: rgba(255, 255, 255, 0.18);
      margin: 0 0.6rem;
    }
  </style>
</head>
<body>
  {% set p = request.url.path %}
  <nav class="navbar navbar-expand-xl navbar-dark bg-dark fixed-top">
    <div class="container-fluid flex-wrap">
      <a class="navbar-brand" href="/admin/">PII Admin</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <div class="d-flex flex-wrap align-items-center me-auto py-2 gap-2">
          <div class="d-flex align-items-center">
            <span class="nav-group-label">모니터링</span>
            <div class="btn-group btn-group-sm" role="group" aria-label="모니터링">
              <a class="btn btn-outline-light nav-btn{% if p == '/admin/' %} active{% endif %}" href="/admin/">홈</a>
              <a class="btn btn-outline-light nav-btn{% if p.startswith('/admin/audit') %} active{% endif %}" href="/admin/audit">API 사용 이력</a>
              <a class="btn btn-outline-light nav-btn{% if p.startswith('/admin/pii-audit') %} active{% endif %}" href="/admin/pii-audit">PII 탐지 이력</a>
            </div>
          </div>
          <div class="nav-divider d-none d-xl-block"></div>
          <div class="d-flex align-items-center">
            <span class="nav-group-label">정책</span>
            <div class="btn-group btn-group-sm" role="group" aria-label="정책">
              <a class="btn btn-outline-light nav-btn{% if p.startswith('/admin/patterns') or p.startswith('/admin/recognizers') %} active{% endif %}" href="/admin/patterns">패턴</a>
              <a class="btn btn-outline-light nav-btn{% if p.startswith('/admin/ip-allowlist') or p.startswith('/admin/exception-ips') or p.startswith('/admin/api-callers') %} active{% endif %}" href="/admin/ip-allowlist">IP 허용</a>
            </div>
          </div>
          <div class="nav-divider d-none d-xl-block"></div>
          <div class="d-flex align-items-center">
            <span class="nav-group-label">운영</span>
            <div class="btn-group btn-group-sm" role="group" aria-label="운영">
              <a class="btn btn-outline-light nav-btn{% if p.startswith('/admin/test') %} active{% endif %}" href="/admin/test">검사 테스트</a>
              <a class="btn btn-outline-light nav-btn{% if p.startswith('/admin/dependencies') %} active{% endif %}" href="/admin/dependencies">라이브러리</a>
              <a class="btn btn-outline-light nav-btn{% if p.startswith('/admin/settings') %} active{% endif %}" href="/admin/settings">설정</a>
            </div>
          </div>
        </div>
        <div class="d-flex align-items-center">
          <a class="btn btn-outline-warning btn-sm nav-btn" href="/admin/logout">로그아웃</a>
        </div>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    {% if flash %}
      <div class="alert alert-{{ flash_type or 'info' }}">{{ flash }}</div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
